<!DOCTYPE html>
<html>

<head>
    <title>Tempo Time Report</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .table-container {
            margin-bottom: 40px;
        }

        .chart-container {
            margin-bottom: 50px;
        }

        .chart-container canvas {
            max-width: 600px;
            margin: auto;
            display: block;
           width: 600px!important;
           height: 600px!important;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1 class="text-center">Tempo Time Report</h1>
        <div id="reportsContainer"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function (event) {
    const reportsContainer = document.querySelector('#reportsContainer');

    fetch('tempo_report.json')
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            for (const [month, monthData] of Object.entries(data)) {
                // Create section for each month
                const monthSection = document.createElement('div');
                monthSection.classList.add('month-section');

                const monthTitle = document.createElement('h2');
                monthTitle.textContent = month;
                monthSection.appendChild(monthTitle);

                // Create table
                const tableContainer = document.createElement('div');
                tableContainer.classList.add('table-container');
                const reportTable = document.createElement('table');
                reportTable.classList.add('table', 'table-striped', 'table-bordered');
                tableContainer.appendChild(reportTable);
                monthSection.appendChild(tableContainer);

                const headerRow = reportTable.insertRow();
                ['Category', 'Hours', 'Percentage', 'Work Description', 'Billed Hours', 'Work date'].forEach(headerText => {
                    const headerCell = document.createElement('th');
                    headerCell.textContent = headerText;
                    headerRow.appendChild(headerCell);
                });

                const chartData = [];
                for (const [key, value] of Object.entries(monthData)) {
                    if (key.endsWith('_time')) {
                        const row = reportTable.insertRow();
                        const categoryCell = row.insertCell();
                        const hoursCell = row.insertCell();
                        const percentageCell = row.insertCell();

                        categoryCell.textContent = key.replace('_time', '').replace(/^\w/, c => c.toUpperCase());
                        hoursCell.textContent = value;

                        const percentageKey = key.replace('_time', '_percentage');
                        percentageCell.textContent = `${(monthData[percentageKey] || 0).toFixed(2)}%`;
                        chartData.push({ name: categoryCell.textContent, value: monthData[percentageKey] || 0 });

                        // Check if there is detailed data for this category
                        const dataKey = key.replace('_time', '_data');
                        if (monthData[dataKey]) {
                            monthData[dataKey].forEach(item => {
                                const dataRow = reportTable.insertRow();
                                const descriptionCell = dataRow.insertCell();
                                const hoursCell = dataRow.insertCell();
                                const dateCell = dataRow.insertCell();

                                descriptionCell.textContent = item['Work Description'];
                                hoursCell.textContent = item['Billed Hours'];
                                dateCell.textContent = item['Work date'];
                            });
                        }
                    }
                }

                // Create Chart
                const chartContainer = document.createElement('div');
                chartContainer.classList.add('chart-container');
                const canvas = document.createElement('canvas');
                canvas.width = 400;
                canvas.height = 400;
                chartContainer.appendChild(canvas);
                monthSection.appendChild(chartContainer);

                const ctx = canvas.getContext('2d');
                new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: chartData.map(item => item.name),
                        datasets: [{
                            data: chartData.map(item => item.value),
                            backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40']
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            title: {
                                display: true,
                                text: month
                            }
                        }
                    }
                });

                reportsContainer.appendChild(monthSection);
            }
        })
        .catch(error => {
            reportsContainer.innerHTML = `<div class="text-danger">Error fetching data: ${error.message}</div>`;
            console.error('Error fetching JSON:', error);
        });
});
    </script>


</body>

</html>
