<!DOCTYPE html>
<html>

<head>
    <title>Tempo Time Report</title>
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        .table-container {
            margin-bottom: 40px;
        }

        .chart-container {
            margin-bottom: 50px;
        }

        .chart-container canvas {
            max-width: 600px;
            margin: auto;
            display: block;
            width: 600px !important;
            height: 600px !important;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1 class="text-center">Tempo Time Report</h1>
        <div id="reportsContainer"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async function() {
  const reportsContainer = document.querySelector('#reportsContainer');

  try {
    const response = await fetch('tempo_report.json');
    const data = await response.json();

    for (const [sheetName, sheetData] of Object.entries(data)) {
      // --- Create Month Section ---
      const monthSection = document.createElement('div');
      monthSection.classList.add('month-section');

      // --- Title ---
      const monthTitle = document.createElement('h2');
      monthTitle.textContent = sheetName; 
      monthSection.appendChild(monthTitle);

      // --- Table ---
      const tableContainer = document.createElement('div');
      tableContainer.classList.add('table-container');
      const reportTable = document.createElement('table');
      reportTable.classList.add('table', 'table-striped', 'table-bordered');
      tableContainer.appendChild(reportTable);
      monthSection.appendChild(tableContainer);

      const tableHead = reportTable.createTHead();
      const headerRow = tableHead.insertRow();
      ['Category', 'Hours', 'Percentage', 'Work Description', 'Billed Hours', 'Work Date'].forEach(headerText => {
        const headerCell = document.createElement('th');
        headerCell.textContent = headerText;
        headerRow.appendChild(headerCell);
      });

      const tableBody = reportTable.createTBody();
      const chartData = [];

      // --- Process Data for Table & Chart ---
      for (const category of ['finca', 'isabelgroup', 'freetime']) {
        const timeKey = category + '_time';
        const percentageKey = category + '_percentage';
        const dataKey = category + '_data';

        if (sheetData.hasOwnProperty(timeKey)) { // Use hasOwnProperty for safer check
          // Category Row
          const row = tableBody.insertRow();
          row.insertCell().textContent = category.charAt(0).toUpperCase() + category.slice(1); // Capitalize
          row.insertCell().textContent = sheetData[timeKey];
          row.insertCell().textContent = `${sheetData[percentageKey].toFixed(2)}%`;
          chartData.push({ name: category, value: sheetData[percentageKey] }); 

          // Detailed Data Rows (if available)
          if (sheetData.hasOwnProperty(dataKey)) {
            for (const item of sheetData[dataKey]) {
              const dataRow = tableBody.insertRow();
              dataRow.insertCell().textContent = ''; // Empty cell in first column
              dataRow.insertCell().textContent = ''; 
              dataRow.insertCell().textContent = '';
              dataRow.insertCell().textContent = item['Work Description'] || '-'; // Use '-' if missing
              dataRow.insertCell().textContent = item['Billed Hours'] || '-';
              dataRow.insertCell().textContent = item['Work date'] || '-';
            }
          }
        }
      }

      // --- Create Pie Chart ---
      const chartContainer = document.createElement('div');
      chartContainer.classList.add('chart-container');
      const canvas = document.createElement('canvas');
      canvas.width = 400;
      canvas.height = 400;
      chartContainer.appendChild(canvas);
      monthSection.appendChild(chartContainer);

      const ctx = canvas.getContext('2d');
      new Chart(ctx, {
        type: 'pie',
        data: {
          labels: chartData.map(item => item.name),
          datasets: [{
            data: chartData.map(item => item.value),
            backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56'] // Colors for 3 categories
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            title: {
              display: true,
              text: sheetName
            }
          }
        }
      });
      
      reportsContainer.appendChild(monthSection);
    } 

  } catch (error) {
    reportsContainer.innerHTML = `<div class="text-danger">Error: ${error.message}</div>`;
    console.error('Error fetching or processing data:', error);
  }
});

    </script>

</body>

</html>
